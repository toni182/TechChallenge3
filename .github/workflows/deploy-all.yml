name: Deploy All Services

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy AUTH
        run: |
          WORKFLOW="auth.yml"

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/dispatches \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\"}"

          sleep 10

          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?per_page=1" \
            | jq -r '.workflow_runs[0].id')

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID)

            STATUS=$(echo $RESPONSE | jq -r '.status')
            CONCLUSION=$(echo $RESPONSE | jq -r '.conclusion')

            echo "AUTH: $STATUS / $CONCLUSION"

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                exit 1
              fi
              break
            fi

            sleep 10
          done

      - name: Deploy FLAG
        run: |
          WORKFLOW="flag.yml"

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/dispatches \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\"}"

          sleep 10

          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?per_page=1" \
            | jq -r '.workflow_runs[0].id')

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
