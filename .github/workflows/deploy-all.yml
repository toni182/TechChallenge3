            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/dispatches \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\"}"

          sleep 10

          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?per_page=1" \
            | jq -r '.workflow_runs[0].id')

          while true; do
            RESPONSE=$(curl -s \
