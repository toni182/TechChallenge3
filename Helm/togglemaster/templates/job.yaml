{{- range $appName, $appConfig := .Values }}
{{- if and (kindIs "map" $appConfig) (hasKey $appConfig "job") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $appConfig.job.name }}
  namespace: {{ $appConfig.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3 #Exec 3 times before fail
  template:
    spec: #Spec pod
      restartPolicy: Never
      containers:
        - name: psql
          image: postgres:15
          command: {{ $appConfig.job.command | toJson }}
          args: {{ $appConfig.job.args | toJson }}
          volumeMounts:
            - name: sql-volume
              mountPath: /sql
          envFrom:
            - secretRef:
                name: {{ $appName }}-db-secret
            - secretRef:
                name: {{ $appName }}-db-secret-host
      volumes:
        - name: sql-volume
          configMap:
            name: {{ $appConfig.configMap.name }}
---
{{- end }}
{{- end }}